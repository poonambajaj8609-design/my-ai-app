<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕏 | Grok Multiverse</title>
    <style>
        :root { --bg: #000; --card: #16181c; --accent: #fff; --text: #e7e9ea; --border: #2f3336; }
        .grok-mode { --accent: #00ffcc; --border: #004433; }
        
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Model Switcher Area */
        .model-settings { background: #0a0a0a; padding: 10px; border-bottom: 1px solid var(--border); font-size: 12px; }
        #modelInput { width: 80%; background: #000; border: 1px solid var(--border); color: #00ffcc; padding: 5px; border-radius: 4px; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 85%; line-height: 1.4; word-wrap: break-word; }
        .ai { background: var(--card); border: 1px solid var(--border); align-self: flex-start; }
        .user { background: var(--accent); color: #000; align-self: flex-end; }
        
        .input-bar { padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        input[type="text"] { flex: 1; background: #202327; border: none; border-radius: 20px; padding: 12px; color: white; outline: none; }
        .send-btn { background: var(--accent); color: black; border: none; border-radius: 20px; padding: 0 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div style="font-size: 20px; font-weight: bold;">𝕏</div>
        <button onclick="document.body.classList.toggle('grok-mode')" style="background:transparent; color:var(--accent); border:1px solid var(--border); border-radius:5px; padding:5px;">TOGGLE GROK</button>
    </div>

    <div class="model-settings">
        <label>Target Model URL:</label><br>
        <input type="text" id="modelInput" value="https://api-inference.huggingface.co/models/gpt2">
    </div>

    <div id="chat-box">
        <div class="msg ai">Interface initialized. Paste a Hugging Face URL above to swap brains.</div>
    </div>

    <div class="input-bar">
        <input type="text" id="prompt" placeholder="Ask anything...">
        <button class="send-btn" onclick="chat()">Send</button>
    </div>

    <script>
        async function chat() {
            const p = document.getElementById('prompt');
            const m = document.getElementById('modelInput');
            const box = document.getElementById('chat-box');
            if(!p.value) return;

            const uMsg = document.createElement('div');
            uMsg.className = 'msg user';
            uMsg.innerText = p.value;
            box.appendChild(uMsg);

            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai';
            aiMsg.innerText = "Querying model...";
            box.appendChild(aiMsg);
            
            const userText = p.value;
            const targetModel = m.value;
            p.value = "";

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: userText,
                        modelUrl: targetModel 
                    })
                });
                const data = await res.json();
                
                // Handles different AI response formats
                let responseText = "";
                if (Array.isArray(data)) responseText = data[0].generated_text;
                else if (data.generated_text) responseText = data.generated_text;
                else if (data.error) responseText = "AI Error: " + data.error;
                else responseText = JSON.stringify(data);

                aiMsg.innerText = responseText;
            } catch (err) {
                aiMsg.innerText = "Connection lost. Ensure your Vercel Environment Variables are set.";
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
