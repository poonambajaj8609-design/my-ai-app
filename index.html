<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-AI | Grok Interface</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0a0a;
            --accent: #ffffff;
            --text: #e7e9ea;
            --border: #2f3336;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Bar */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 900; font-size: 20px; letter-spacing: -1px; }

        /* Chat Area */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        /* Input Area */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 15px;
            display: flex;
            gap: 10px;
            background: var(--bg);
        }

        input {
            flex: 1;
            background: #16181c;
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 12px 20px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 999px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Grok Theme Toggle */
        .grok-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 12px;
            padding: 5px 10px;
        }

        .grok-mode { --accent: #00ffcc; --border: #004433; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">𝕏 AI</div>
        <button class="grok-btn" onclick="toggleGrok()">MODE: DEFAULT</button>
    </div>

    <div id="chat-window">
        <div class="msg ai">Ask me anything about Minecraft or coding.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask Grok..." onkeypress="if(event.key === 'Enter') sendMsg()">
        <button onclick="sendMsg()">Send</button>
    </div>

    <script>
        function toggleGrok() {
            document.body.classList.toggle('grok-mode');
            const btn = document.querySelector('.grok-btn');
            btn.innerText = document.body.classList.contains('grok-mode') ? "MODE: GROK" : "MODE: DEFAULT";
        }

        async function sendMsg() {
            const input = document.getElementById('userInput');
            const chatWindow = document.getElementById('chat-window');
            if (!input.value) return;

            // Add User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user';
            userDiv.innerText = input.value;
            chatWindow.appendChild(userDiv);

            // Create AI Message Box
            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai';
            aiDiv.innerText = "...";
            chatWindow.appendChild(aiDiv);
            
            const prompt = input.value;
            input.value = "";
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // This calls your /api/chat.js worker
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({ text: prompt })
                });
                const data = await res.json();
                aiDiv.innerText = data[0].generated_text || "The robot is recharging.";
            } catch (e) {
                aiDiv.innerText = "Error: Connection to AI lost.";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
